version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: resilience-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: resilienceai
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: echo 'try { rs.initiate({_id:"rs0",members:[{_id:0,host:"mongodb:27017"}]}) } catch(e) { rs.status().ok }' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - resilience-net

  redis:
    image: redis:7-alpine
    container_name: resilience-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - resilience-net

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: resilience-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resilience-net

volumes:
  mongo_data:
    driver: local
    name: resilience_mongo_data
  redis_data:
    driver: local
    name: resilience_redis_data
  qdrant_data:
    driver: local
    name: resilience_qdrant_data

networks:
  resilience-net:
    driver: bridge
    name: resilience-net
